<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>GO GOAL - EURO54</title>
<style>
/* ZOOM BLOCK - ULTRA */
html,body{touch-action:pan-x pan-y!important;-ms-touch-action:pan-x pan-y!important;overscroll-behavior:none}

/* ============================================
   EURO54 DESIGN SYSTEM - iOS Glassmorphism
   ============================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --e54-bg-primary: #0a1628;
  --e54-bg-secondary: #111d35;
  --e54-gold: #FFD700;
  --e54-gold-dark: #F0A500;
  --e54-gold-light: #FFE066;
  --e54-glass: rgba(255,255,255,0.08);
  --e54-glass-light: rgba(255,255,255,0.15);
  --e54-glass-border: rgba(255,255,255,0.12);
  --e54-text: #ffffff;
  --e54-text-muted: #7b8da4;
  --e54-green: #00e676;
  --e54-red: #ff5252;
  --e54-blue: #448aff;
  --e54-radius: 18px;
  --e54-radius-sm: 12px;
  --e54-radius-lg: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body.euro54-body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(145deg, #0a1628 0%, #0f1f3d 40%, #162040 70%, #0a1628 100%);
  color: var(--e54-text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body.euro54-body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(255,215,0,0.04) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(68,138,255,0.03) 0%, transparent 50%);
  animation: e54-ambientDrift 20s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes e54-ambientDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(30px, -20px) rotate(3deg); }
}

/* HEADER */
.e54-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(10,22,40,0.75);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: e54-slideDown 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes e54-slideDown {
  from { opacity: 0; transform: translateY(-100%); }
  to { opacity: 1; transform: translateY(0); }
}

.e54-logo {
  font-size: 1.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold), var(--e54-gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
  text-shadow: none;
  filter: drop-shadow(0 1px 2px rgba(255,215,0,0.3));
}

.e54-logo-sub {
  font-size: 0.65rem;
  color: var(--e54-text-muted);
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-left: 8px;
}

.e54-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: e54-pulse 2s ease-in-out infinite;
}

.e54-status-dot.live { background: var(--e54-green); box-shadow: 0 0 8px var(--e54-green); }
.e54-status-dot.wait { background: var(--e54-gold); box-shadow: 0 0 8px var(--e54-gold); }
.e54-status-dot.error { background: var(--e54-red); box-shadow: 0 0 8px var(--e54-red); }

@keyframes e54-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* MAIN CONTAINER */
.e54-main {
  position: relative;
  z-index: 1;
  padding: 80px 16px 24px;
  max-width: 500px;
  margin: 0 auto;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
}

@keyframes e54-fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* GAME TITLE */
.e54-game-title {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--e54-text);
  margin-bottom: 16px;
  letter-spacing: 0.3px;
}

/* IFRAME WRAPPER */
.e54-iframe-wrap {
  width: 100%;
  height: 320px;
  border-radius: var(--e54-radius);
  overflow: hidden;
  position: relative;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
}

.e54-iframe-wrap iframe {
  width: 100%;
  height: 650px;
  border: none;
  position: relative;
  top: -40px;
  pointer-events: auto;
}

.e54-iframe-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(180deg, rgba(10,22,40,0.6) 0%, transparent 15%, transparent 85%, rgba(10,22,40,0.6) 100%);
  pointer-events: none;
  z-index: 2;
  border-radius: var(--e54-radius);
}

/* PREDICTION CARD */
.e54-prediction {
  margin-top: 20px;
  padding: 20px;
  border-radius: var(--e54-radius);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  background: linear-gradient(135deg, rgba(255,215,0,0.08) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid rgba(255,215,0,0.15);
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.35s both;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 40px rgba(255,215,0,0.05);
}

.e54-prediction::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,0.05) 50%, transparent 60%);
  animation: e54-shimmer 4s ease-in-out infinite;
}

@keyframes e54-shimmer {
  0% { transform: translateX(-100%) translateY(-100%); }
  100% { transform: translateX(100%) translateY(100%); }
}

.e54-prediction-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--e54-gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.e54-prediction-value {
  font-size: 2.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  z-index: 1;
  line-height: 1.2;
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.e54-prediction-value.animate {
  animation: e54-springBounce 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes e54-springBounce {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.15); }
  80% { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}

.e54-prediction-state {
  font-size: 0.75rem;
  color: var(--e54-text-muted);
  margin-top: 6px;
  position: relative;
  z-index: 1;
}

/* BUTTONS */
.e54-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 16px 28px;
  border: none;
  border-radius: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #0a1628;
  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold), var(--e54-gold-dark));
  background-size: 200% 200%;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 4px 16px rgba(255,215,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.45s both;
  margin-top: 20px;
}

.e54-btn:active {
  transform: scale(0.96);
  box-shadow: 0 2px 8px rgba(255,215,0,0.15);
}

.e54-btn:hover {
  background-position: 100% 0;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,215,0,0.3);
}

.e54-btn-back {
  width: 100%;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  color: var(--e54-text-muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
}

.e54-btn-back:active { transform: scale(0.97); }
.e54-btn-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* MINES BOARD */
.e54-mines-container {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--e54-radius-lg);
  padding: 20px;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}

.e54-mines-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}

.e54-mines-controls button {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.08);
  color: var(--e54-gold);
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.e54-mines-controls button:active { transform: scale(0.9); }

.e54-mines-controls span {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--e54-text-muted);
}

.e54-mines-board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.e54-mines-tile {
  aspect-ratio: 1;
  border-radius: 12px;
  background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.e54-mines-tile:hover {
  transform: scale(1.06);
  background: rgba(255,215,0,0.1);
  border-color: rgba(255,215,0,0.2);
  box-shadow: 0 0 16px rgba(255,215,0,0.1);
}

.e54-mines-tile.revealed {
  background: linear-gradient(145deg, rgba(0,230,118,0.2), rgba(0,230,118,0.05));
  border-color: rgba(0,230,118,0.3);
  animation: e54-tileReveal 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

.e54-mines-tile.mine {
  background: linear-gradient(145deg, rgba(255,82,82,0.25), rgba(255,82,82,0.08));
  border-color: rgba(255,82,82,0.3);
}

@keyframes e54-tileReveal {
  0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
  70% { transform: scale(1.1) rotate(3deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}

/* MULTIPLIER BAR */
.e54-mult-bar {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-radius: var(--e54-radius-sm);
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.1);
  margin-bottom: 16px;
}

.e54-mult-bar span {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--e54-gold);
}

/* FOOTER */
.e54-footer {
  text-align: center;
  padding: 20px;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.e54-badge {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 6px 14px;
  border-radius: 20px;
  backdrop-filter: blur(16px);
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.15);
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--e54-gold);
  letter-spacing: 1.5px;
  z-index: 100;
  animation: e54-badgeFloat 3s ease-in-out infinite;
  pointer-events: none;
}

@keyframes e54-badgeFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* RESPONSIVE */
@media (max-width: 400px) {
  .e54-main { padding: 70px 12px 20px; }
  .e54-prediction-value { font-size: 2.2rem; }
  .e54-iframe-wrap { height: 280px; }
}

/* REDUCED MOTION */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
.grid-container {
  display: grid;
  gap: 8px;
  margin: 16px 0;
  --grid-ratio: 1.75;
  aspect-ratio: var(--grid-ratio);
}
.grid-item {
  background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  animation: e54-fadeInUp 0.4s ease both;
  position: relative;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.grid-item.visited {
  background: linear-gradient(145deg, rgba(0,230,118,0.15), rgba(0,230,118,0.05));
  border-color: rgba(0,230,118,0.2);
}
.ball-container {
  width: 70%;
  height: 70%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ball {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 2px 6px rgba(255,215,0,0.5));
}
.ball.landing {
  animation: e54-springBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.ball-trail { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
.trail-particle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,215,0,0.6), transparent);
  animation: trailFade 0.6s ease-out forwards;
}
@keyframes trailFade {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0); }
}
.size-select {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: white;
  padding: 10px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  width: 100%;
  appearance: none;
  cursor: pointer;
}
.size-select option { background: #0f1f3d; color: white; }
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: rgba(15,31,61,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  animation: e54-springBounce 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-content h2 {
  font-size: 1.4rem;
  color: var(--e54-gold);
  margin-bottom: 8px;
}
.modal-content p { color: var(--e54-text-muted); margin-bottom: 20px; }
</style>
</head>
<body class="euro54-body">
<div class="e54-header">
  <div style="display:flex;align-items:center;">
    <span class="e54-logo">EURO54</span>
    <span class="e54-logo-sub">Predictions</span>
  </div>
</div>

<div class="e54-main">
  <div class="e54-game-title">GO GOAL</div>
  
  <div style="margin-bottom:12px;">
    <select id="gridSizeSelect" class="size-select" onchange="updateGridSize()">
      <option value="3x4">Petit</option>
      <option value="4x7" selected>Moyen</option>
      <option value="5x10">Grand</option>
    </select>
  </div>
  
  <div class="grid-container"></div>
  
  <button class="e54-btn" id="predictBtn" onclick="triggerPredict()">Prédire</button>
  
  <button class="e54-btn-back" onclick="history.back()">← Retour</button>
  
  <div class="e54-footer">EURO54 &copy; 2025</div>
</div>

<div class="e54-badge">EURO54</div>

<div class="modal" id="gameOverModal">
  <div class="modal-content">
    <h2>Terminé!</h2>
    <p>Le signal a atteint la fin du parcours.</p>
    <button class="e54-btn" onclick="resetGame()" style="margin-top:0;">Recommencer</button>
  </div>
</div>

<script>
let currentRow = null;
let currentCol = -1;
let ROWS = 4;
let COLS = 7;

document.addEventListener("DOMContentLoaded", () => {
  createGrid(ROWS, COLS);
});

function createGrid(rows, cols) {
  const gridContainer = document.querySelector(".grid-container");
  gridContainer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  gridContainer.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  gridContainer.innerHTML = '';
  
  for (let i = 0; i < rows * cols; i++) {
    const gridItem = document.createElement("div");
    gridItem.className = "grid-item";
    gridItem.style.animationDelay = (i * 50) + 'ms';
    gridContainer.appendChild(gridItem);
  }
}

function changeGridSize(rows, cols) {
  resetGame();
  ROWS = rows;
  COLS = cols;
  const ratio = cols / rows;
  document.documentElement.style.setProperty("--grid-ratio", ratio);
  createGrid(rows, cols);

  // Sync dropdown
  const select = document.getElementById('gridSizeSelect');
  if (select) select.value = `${rows}x${cols}`;
}

function updateGridSize() {
  const select = document.getElementById('gridSizeSelect');
  const [rows, cols] = select.value.split('x').map(Number);
  changeGridSize(rows, cols);
}

function createBall() {
  const ballImg = document.createElement("img");
  ballImg.src = "https://img.icons8.com/emoji/48/soccer-ball-emoji.png";
  ballImg.className = "ball landing";
  
  const ballContainer = document.createElement("div");
  ballContainer.className = "ball-container";
  ballContainer.appendChild(ballImg);
  
  ballImg.style.opacity = '0';
  ballImg.style.transform = "scale(0)";
  
  setTimeout(() => {
    ballImg.style.transition = "all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)";
    ballImg.style.opacity = '1';
    ballImg.style.transform = "scale(1)";
  }, 50);
  
  return ballContainer;
}

function createTrailEffect(x, y, size) {
  const trailContainer = document.createElement("div");
  trailContainer.className = "ball-trail";
  document.body.appendChild(trailContainer);
  
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      if (document.body.contains(trailContainer)) {
        const particle = document.createElement("div");
        particle.className = "trail-particle";
        const randomX = (Math.random() - 0.5) * 20;
        const randomY = (Math.random() - 0.5) * 20;
        particle.style.width = size * (0.3 + Math.random() * 0.3) + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = (x + randomX) + 'px';
        particle.style.top = (y + randomY) + 'px';
        trailContainer.appendChild(particle);
        
        setTimeout(() => {
          if (trailContainer.contains(particle)) {
            trailContainer.removeChild(particle);
          }
        }, 800);
      }
    }, i * 100);
  }
  
  setTimeout(() => {
    if (document.body.contains(trailContainer)) {
      document.body.removeChild(trailContainer);
    }
  }, 1500);
}

function showGameOver() {
  const gameOverModal = document.getElementById("gameOverModal");
  gameOverModal.style.display = "flex";
}

function resetGame() {
  const gameOverModal = document.getElementById("gameOverModal");
  gameOverModal.style.display = "none";
  
  const gridItems = document.querySelectorAll(".grid-item");
  gridItems.forEach(item => {
    item.classList.remove("visited");
    if (item.contains(ball)) {
      item.removeChild(ball);
    }
  });
  
  currentRow = null;
  currentCol = -1;
  ball = null;
  isMoving = false;
}

function moveBall() {
  if (isMoving) {
    return;
  }
  
  const gridItems = document.querySelectorAll(".grid-item");
  
  if (currentCol === -1) {
    currentRow = Math.floor(Math.random() * ROWS);
    currentCol = 0;
    ball = createBall();
    const currentCell = gridItems[currentRow * COLS + currentCol];
    currentCell.appendChild(ball);
    currentCell.classList.add("visited");
    currentCell.style.boxShadow = "inset 0 0 30px rgba(255, 255, 255, 0.4), 0 0 20px rgba(255, 255, 255, 0.2)";
    
    setTimeout(() => {
      currentCell.style.boxShadow = '';
    }, 800);
    return;
  }
  
  if (currentCol >= COLS - 1) {
    showGameOver();
    return;
  }
  
  isMoving = true;
  let newRow = Math.floor(Math.random() * ROWS);
  const currentCell = gridItems[currentRow * COLS + currentCol];
  const nextCell = gridItems[newRow * COLS + currentCol + 1];
  nextCell.classList.add("visited");
  
  const ballClone = ball.cloneNode(true);
  const ballElement = ballClone.querySelector(".ball");
  ballElement.classList.remove("landing");
  ballElement.classList.add("ball-moving");
  document.body.appendChild(ballClone);
  
  const currentRect = currentCell.getBoundingClientRect();
  const nextRect = nextCell.getBoundingClientRect();
  ballClone.style.position = "fixed";
  
  const ballSize = Math.min(currentRect.width, currentRect.height) * 0.6;
  const startX = currentRect.left + (currentRect.width - ballSize) / 2;
  const startY = currentRect.top + (currentRect.height - ballSize) / 2;
  
  ballClone.style.left = startX + 'px';
  ballClone.style.top = startY + 'px';
  ballClone.style.width = ballSize + 'px';
  ballClone.style.height = ballSize + 'px';
  ballClone.style.zIndex = "100";
  
  const endX = nextRect.left + (nextRect.width - ballSize) / 2;
  const endY = nextRect.top + (nextRect.height - ballSize) / 2;
  const startTime = Date.now();
  const jumpHeight = Math.abs(endY - startY) * 0.5 + 50;
  
  const trailInterval = setInterval(() => {
    const ballRect = ballClone.getBoundingClientRect();
    const ballCenterX = ballRect.left + ballRect.width / 2;
    const ballCenterY = ballRect.top + ballRect.height / 2;
    createTrailEffect(ballCenterX, ballCenterY, ballSize * 0.3);
  }, 100);
  
  function animate() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / 800, 1);
    const easedProgress = cubicBezier(0.34, 1.56, 0.64, 1, progress);
    const currentX = startX + (endX - startX) * easedProgress;
    let currentY = startY + (endY - startY) * easedProgress;
    
    const parabola = 4 * easedProgress * (1 - easedProgress);
    const jumpOffset = -jumpHeight * parabola;
    
    ballClone.style.left = currentX + 'px';
    ballClone.style.top = (currentY + jumpOffset) + 'px';
    ballElement.style.transform = `rotate(${easedProgress * 360}deg)`;
    
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      clearInterval(trailInterval);
      nextCell.style.boxShadow = "inset 0 0 30px rgba(255, 255, 255, 0.4), 0 0 20px rgba(255, 255, 255, 0.2)";
      
      setTimeout(() => {
        nextCell.style.boxShadow = '';
      }, 800);
      
      document.body.removeChild(ballClone);
      currentCell.removeChild(ball);
      ball.querySelector(".ball").classList.add("landing");
      nextCell.appendChild(ball);
      
      setTimeout(() => {
        const ballEl = ball.querySelector(".ball");
        if (ballEl) {
          ballEl.classList.remove("landing");
        }
      }, 800);
      
      currentRow = newRow;
      currentCol++;
      isMoving = false;
    }
  }
  
  animate();
}

function cubicBezier(p1x, p1y, p2x, p2y, t) {
  const cx = 3 * p1x;
  const bx = 3 * (p2x - p1x) - cx;
  const ax = 1 - cx - bx;
  const cy = 3 * p1y;
  const by = 3 * (p2y - p1y) - cy;
  const ay = 1 - cy - by;
  
  const t2 = t * t;
  const t3 = t2 * t;
  
  return ay * t3 + by * t2 + cy * t;
}

function triggerPredict() {
  const btn = document.getElementById('predictBtn');
  btn.textContent = 'Analyse...';
  btn.style.opacity = '0.7';
  btn.disabled = true;
  
  // Small delay for "analysis" feel
  setTimeout(() => {
    moveBall();
    btn.textContent = 'Prédire';
    btn.style.opacity = '1';
    btn.disabled = false;
  }, 600);
}

let ball = null;
let isMoving = false;
