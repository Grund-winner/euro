<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pirate - EURO54</title>
<style>
/* ============================================
   EURO54 DESIGN SYSTEM - iOS Glassmorphism
   ============================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --e54-bg-primary: #0a1628;
  --e54-bg-secondary: #111d35;
  --e54-gold: #FFD700;
  --e54-gold-dark: #F0A500;
  --e54-gold-light: #FFE066;
  --e54-glass: rgba(255,255,255,0.08);
  --e54-glass-light: rgba(255,255,255,0.15);
  --e54-glass-border: rgba(255,255,255,0.12);
  --e54-text: #ffffff;
  --e54-text-muted: #7b8da4;
  --e54-green: #00e676;
  --e54-red: #ff5252;
  --e54-blue: #448aff;
  --e54-radius: 18px;
  --e54-radius-sm: 12px;
  --e54-radius-lg: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body.euro54-body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(145deg, #0a1628 0%, #0f1f3d 40%, #162040 70%, #0a1628 100%);
  color: var(--e54-text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body.euro54-body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(255,215,0,0.04) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(68,138,255,0.03) 0%, transparent 50%);
  animation: e54-ambientDrift 20s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes e54-ambientDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(30px, -20px) rotate(3deg); }
}

/* HEADER */
.e54-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(10,22,40,0.75);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: e54-slideDown 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes e54-slideDown {
  from { opacity: 0; transform: translateY(-100%); }
  to { opacity: 1; transform: translateY(0); }
}

.e54-logo {
  font-size: 1.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold), var(--e54-gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
  text-shadow: none;
  filter: drop-shadow(0 1px 2px rgba(255,215,0,0.3));
}

.e54-logo-sub {
  font-size: 0.65rem;
  color: var(--e54-text-muted);
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-left: 8px;
}

.e54-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: e54-pulse 2s ease-in-out infinite;
}

.e54-status-dot.live { background: var(--e54-green); box-shadow: 0 0 8px var(--e54-green); }
.e54-status-dot.wait { background: var(--e54-gold); box-shadow: 0 0 8px var(--e54-gold); }
.e54-status-dot.error { background: var(--e54-red); box-shadow: 0 0 8px var(--e54-red); }

@keyframes e54-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* MAIN CONTAINER */
.e54-main {
  position: relative;
  z-index: 1;
  padding: 80px 16px 24px;
  max-width: 500px;
  margin: 0 auto;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
}

@keyframes e54-fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* GAME TITLE */
.e54-game-title {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--e54-text);
  margin-bottom: 16px;
  letter-spacing: 0.3px;
}

/* IFRAME WRAPPER */
.e54-iframe-wrap {
  width: 100%;
  height: 320px;
  border-radius: var(--e54-radius);
  overflow: hidden;
  position: relative;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
}

.e54-iframe-wrap iframe {
  width: 100%;
  height: 650px;
  border: none;
  position: relative;
  top: -40px;
  pointer-events: auto;
}

.e54-iframe-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(180deg, rgba(10,22,40,0.6) 0%, transparent 15%, transparent 85%, rgba(10,22,40,0.6) 100%);
  pointer-events: none;
  z-index: 2;
  border-radius: var(--e54-radius);
}

/* PREDICTION CARD */
.e54-prediction {
  margin-top: 20px;
  padding: 20px;
  border-radius: var(--e54-radius);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  background: linear-gradient(135deg, rgba(255,215,0,0.08) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid rgba(255,215,0,0.15);
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.35s both;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 40px rgba(255,215,0,0.05);
}

.e54-prediction::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,0.05) 50%, transparent 60%);
  animation: e54-shimmer 4s ease-in-out infinite;
}

@keyframes e54-shimmer {
  0% { transform: translateX(-100%) translateY(-100%); }
  100% { transform: translateX(100%) translateY(100%); }
}

.e54-prediction-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--e54-gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.e54-prediction-value {
  font-size: 2.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  z-index: 1;
  line-height: 1.2;
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.e54-prediction-value.animate {
  animation: e54-springBounce 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes e54-springBounce {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.15); }
  80% { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}

.e54-prediction-state {
  font-size: 0.75rem;
  color: var(--e54-text-muted);
  margin-top: 6px;
  position: relative;
  z-index: 1;
}

/* BUTTONS */
.e54-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 16px 28px;
  border: none;
  border-radius: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #0a1628;
  background: linear-gradient(135deg, var(--e54-gold-light), var(--e54-gold), var(--e54-gold-dark));
  background-size: 200% 200%;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 4px 16px rgba(255,215,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.45s both;
  margin-top: 20px;
}

.e54-btn:active {
  transform: scale(0.96);
  box-shadow: 0 2px 8px rgba(255,215,0,0.15);
}

.e54-btn:hover {
  background-position: 100% 0;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,215,0,0.3);
}

.e54-btn-back {
  width: 100%;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  color: var(--e54-text-muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
}

.e54-btn-back:active { transform: scale(0.97); }
.e54-btn-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* MINES BOARD */
.e54-mines-container {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--e54-radius-lg);
  padding: 20px;
  animation: e54-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}

.e54-mines-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}

.e54-mines-controls button {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.08);
  color: var(--e54-gold);
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.e54-mines-controls button:active { transform: scale(0.9); }

.e54-mines-controls span {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--e54-text-muted);
}

.e54-mines-board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.e54-mines-tile {
  aspect-ratio: 1;
  border-radius: 12px;
  background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.e54-mines-tile:hover {
  transform: scale(1.06);
  background: rgba(255,215,0,0.1);
  border-color: rgba(255,215,0,0.2);
  box-shadow: 0 0 16px rgba(255,215,0,0.1);
}

.e54-mines-tile.revealed {
  background: linear-gradient(145deg, rgba(0,230,118,0.2), rgba(0,230,118,0.05));
  border-color: rgba(0,230,118,0.3);
  animation: e54-tileReveal 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

.e54-mines-tile.mine {
  background: linear-gradient(145deg, rgba(255,82,82,0.25), rgba(255,82,82,0.08));
  border-color: rgba(255,82,82,0.3);
}

@keyframes e54-tileReveal {
  0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
  70% { transform: scale(1.1) rotate(3deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}

/* MULTIPLIER BAR */
.e54-mult-bar {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-radius: var(--e54-radius-sm);
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.1);
  margin-bottom: 16px;
}

.e54-mult-bar span {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--e54-gold);
}

/* FOOTER */
.e54-footer {
  text-align: center;
  padding: 20px;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.e54-badge {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 6px 14px;
  border-radius: 20px;
  backdrop-filter: blur(16px);
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.15);
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--e54-gold);
  letter-spacing: 1.5px;
  z-index: 100;
  animation: e54-badgeFloat 3s ease-in-out infinite;
  pointer-events: none;
}

@keyframes e54-badgeFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* RESPONSIVE */
@media (max-width: 400px) {
  .e54-main { padding: 70px 12px 20px; }
  .e54-prediction-value { font-size: 2.2rem; }
  .e54-iframe-wrap { height: 280px; }
}

/* REDUCED MOTION */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


.game-area { background:linear-gradient(145deg, #0c141d, #162040); position:relative; flex:1; min-height:50vh; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.06); display:flex; align-items:flex-end; padding-bottom:8%; }
.control-panel { background:rgba(255,255,255,0.04); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:16px; margin-top:12px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.risk-btn { flex:1; padding:10px; border-radius:8px; font-weight:bold; font-size:13px; border:none; cursor:pointer; font-family:'Inter',sans-serif; background:transparent; color:var(--e54-text-muted); }
.risk-btn.active { background:var(--e54-green); color:#000; }
.play-btn { background:var(--e54-green); color:#000; border:none; border-radius:12px; font-size:20px; font-weight:800; cursor:pointer; font-family:'Inter',sans-serif; box-shadow:0 4px 0 #1b8a2e; width:140px; }
.play-btn:active:not(:disabled) { transform:translateY(3px); box-shadow:0 1px 0 #1b8a2e; }
.game-over-modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
.game-over-modal.show { display:flex; }
.game-over-modal h2 { font-size:3rem; font-weight:800; color:var(--e54-red); margin-bottom:8px; }
.game-over-modal p { font-size:1.25rem; color:var(--e54-text-muted); margin-bottom:24px; }
.game-over-modal button { background:var(--e54-green); color:#000; border:none; padding:14px 40px; border-radius:999px; font-size:1.2rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; }
.multiplier-display { position:absolute; top:12px; left:12px; z-index:150; background:rgba(0,0,0,0.5); padding:10px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(12px); }
.multiplier-display .label { font-size:10px; color:var(--e54-text-muted); text-transform:uppercase; font-weight:700; letter-spacing:1px; }
.multiplier-display .value { font-size:2rem; font-weight:800; color:var(--e54-green); }
.enemy-slot { display:flex; flex-direction:column; align-items:center; }
.mult-tag { background:rgba(255,255,255,0.9); color:#000; padding:2px 10px; border-radius:4px; font-weight:800; font-size:14px; margin-top:6px; font-family:'Inter',sans-serif; }
.hero-chicken { position:absolute; width:100px; left:10%; bottom:12%; z-index:100; transition:transform 0.2s; }

</style>
</head>
<body class="euro54-body">
<header class="e54-header">
    <div style="display:flex;align-items:center;">
      <span class="e54-logo">EURO54</span>
      <span class="e54-logo-sub">Predictions</span>
    </div>
    <div><span class="e54-status-dot live"></span></div>
</header>
<div class="e54-main">
  <div class="e54-game-title">Pirate</div>
  <div style="width:100%;border-radius:var(--e54-radius);overflow:hidden;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);">
    <img src="banner.png" alt="Pirate" style="width:100%;height:160px;object-fit:cover;display:block;">
  </div>
  
    <div style="position:relative;">
      <div class="multiplier-display">
        <div class="label">Total Bounty</div>
        <div class="value" id="totalMult">1.00x</div>
      </div>
      <div class="game-area">
        <div id="enemyLine" style="display:flex;gap:30px;padding-left:180px;transition:transform 0.6s;"></div>
      </div>
      <div class="control-panel">
        <div style="flex:1;">
          <div style="font-size:10px;color:var(--e54-text-muted);text-transform:uppercase;font-weight:700;margin-bottom:6px;">Risk Setting</div>
          <div style="display:flex;gap:4px;background:rgba(0,0,0,0.3);padding:4px;border-radius:10px;">
            <button onclick="setRisk(0.15, this)" class="risk-btn active">LOW</button>
            <button onclick="setRisk(0.35, this)" class="risk-btn">MED</button>
            <button onclick="setRisk(0.55, this)" class="risk-btn">HIGH</button>
          </div>
        </div>
        <button id="attackBtn" onclick="fight()" class="play-btn">ATTACK</button>
      </div>
    </div>
    <div id="deathScreen" class="game-over-modal">
      <h2>FED TO THE SHARKS!</h2>
      <p id="deathStat">Bounty: 1.00x</p>
      <button onclick="location.reload()">RETRY RAID</button>
    </div>

  <button onclick="history.back()" class="e54-btn-back">Back</button>
</div>
